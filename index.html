<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>동래옥 주방 발주</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#eef2f7;margin:0;padding:18px}
.card{max-width:720px;margin:auto;background:#fff;padding:22px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
h1{text-align:center;color:#c62828}
.item{display:flex;align-items:center;justify-content:space-between;background:#fafafa;border-radius:14px;padding:12px 14px;margin:10px 0}
.name{font-weight:700;font-size:17px}
.ctrl{display:flex;align-items:center;gap:12px}
.ctrl button{width:36px;height:36px;border:none;border-radius:50%;font-size:22px;font-weight:bold;cursor:pointer;transition:.15s}
.minus{background:#ddd}
.plus{background:#d32f2f;color:#fff}
.ctrl button:active{transform:scale(1.15)}
.count{min-width:48px;text-align:center;font-weight:700;font-size:20px}
button.main{width:100%;margin-top:16px;padding:14px;border:none;border-radius:14px;background:#c62828;color:#fff;font-size:18px}
#sheet{background:#fff;margin-top:20px;padding:20px;border:2px solid #ddd}
.row{display:flex;justify-content:space-between;border-bottom:1px dashed #ccc;padding:6px 0}
</style>
</head>
<body>
<div class="card">
<h1>🍲 동래옥 주방 발주</h1>
<p>날짜 <input type="date" id="d"></p>

<div id="items"></div>

<button onclick="makeSheet()">발주서 만들기</button>
<button onclick="saveImg()">이미지 저장</button>

<div id="sheet">
<h2 style="text-align:center">동래옥 진접본점</h2>
<h3 style="text-align:center">발주서</h3>
<p id="dateTxt"></p>
<div id="list"></div>
<p style="text-align:center;margin-top:20px">감사합니다.</p>
</div>
</div>

<script>
const names=[
["토종순대","박스"],["백순대","박스"],["찰순대","박스"],["돼지머리(탕용)","박스"],["돼지머리(수육용)","박스"],
["다대기","박스"],["사골육수","박스"],["갈비탕","박스"],
["낚지볶음","박스"],["편육","박스"],["돈가스","박스"],["소곱창 전골","박스"],["소고기 곰탕","박스"],["순살족발","박스"],["함박","박스"],["우삼겹","박스"],["겉절이 김치","박스"],["돼지곱창","박스"],["오소리","박스"],
];
const wrap=document.getElementById("items");
const qtys=new Array(names.length).fill(0);
const wrap=document.getElementById("items");
names.forEach((n,i)=>{
wrap.innerHTML+=`<div class="item"><span class="name">${n[0]}</span><div class="ctrl"><button class="minus" onmousedown="hold(${i},-1)" onmouseup="stopHold()" onmouseleave="stopHold()">-</button><span class="count" id="v${i}">0</span><button class="plus" onmousedown="hold(${i},1)" onmouseup="stopHold()" onmouseleave="stopHold()">+</button></div></div>`;
});
let t;
function hold(i,d){chg(i,d);t=setInterval(()=>chg(i,d),180);}
function stopHold(){clearInterval(t);}
function chg(i,d){qtys[i]=Math.max(0,qtys[i]+d);document.getElementById("v"+i).textContent=qtys[i];}
document.getElementById("d").value=new Date().toISOString().slice(0,10);

function makeSheet(){
 let list=document.getElementById("list");
 list.innerHTML="";
 document.getElementById("dateTxt").innerText=document.getElementById("d").value;
 names.forEach((n,i)=>{
   let q=qtys[i];
   if(q>0){
      list.innerHTML+=`<div class=row><span>✔ ${n[0]}</span><b>${q}${n[1]}</b></div>`;
   }
 });
}

function saveImg(){
 html2canvas(document.getElementById("sheet")).then(canvas=>{
   const a=document.createElement("a");
   a.download="동래옥_발주서.png";
   a.href=canvas.toDataURL();
   a.click();
 });
}
</script>
</body>
</html>
